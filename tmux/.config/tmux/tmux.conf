# ─────────────────────────────────────────────
#  ALLGEMEIN
# ─────────────────────────────────────────────
set -g default-terminal "screen-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -g base-index 1              # Fenster ab 1 nummerieren
set -g pane-base-index 1         # Panes ab 1 nummerieren
set -g renumber-windows on       # Lücken in Nummerierung schließen
set -g history-limit 10000       # Scrollback Buffer

# ─────────────────────────────────────────────
#  VI-MODE
# ─────────────────────────────────────────────
set -g mode-keys vi

bind Enter copy-mode              # Enter → Copy-Mode starten
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel
bind -T copy-mode-vi Escape send -X cancel

# ─────────────────────────────────────────────
#  SPLITS & NAVIGATION
# ─────────────────────────────────────────────
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Zwischen Panes mit Vim-Keys wechseln
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ─────────────────────────────────────────────
#  STATUS-BAR
# ─────────────────────────────────────────────
set -g status-position bottom
set -g status-interval 1
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"

# Links – Session Name
set -g status-left-length 30
set -g status-left "#[bg=#89b4fa,fg=#1e1e2e,bold] #S #[bg=#1e1e2e,fg=#89b4fa]"

# Rechts – Uhrzeit & Datum
set -g status-right-length 60
set -g status-right "#[fg=#6c7086]  %H:%M  %d.%m.%Y "

# Fenster in der Mitte
set -g status-justify centre
setw -g window-status-format " #I #W "
setw -g window-status-current-format "#[bg=#313244,fg=#cdd6f4,bold] #I #W "

# ─────────────────────────────────────────────
#  PANE BORDERS
# ─────────────────────────────────────────────
set -g pane-border-style "fg=#313244"
set -g pane-active-border-style "fg=#89b4fa"