format = """
$directory$git_branch$git_status$cmd_duration
$character"""

[directory]
style = "bold blue"
truncation_length = 3
truncate_to_repo = true
home_symbol = "~"

[git_branch]
symbol = " "
style = "bold purple"
format = "[$symbol$branch]($style) "

[git_status]
format = '([$all_status$ahead_behind]($style) )'
style = "bold red"
modified = "! "
staged = "+ "
untracked = "? "
ahead = "⇡${count} "
behind = "⇣${count} "

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"